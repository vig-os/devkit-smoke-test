# Managed by vigOS devkit — regenerated on upgrade; local edits are lost.
# Customize in justfile.project. Bugs / missing tools: https://github.com/vig-os/devkit/issues

# CI Workflow (mode-aware)
#
# One workflow for every DEVKIT_MODE. Toolchain provisioning is split from image
# selection per https://github.com/vig-os/devkit/blob/main/docs/rfcs/ADR-conditional-container-toolchain.md (Option A,
# #991): a leading `resolve-toolchain` job reads `.vig-os` and outputs the
# delivery `mode` and container `image` — the devcontainer image for the
# container-ish modes, an EXPLICIT EMPTY STRING for direnv/bare (which makes the
# downstream job run directly on the host runner). Every job then declares
# `container: image: ${{ needs.resolve-toolchain.outputs.image }}` — inert on the
# host when the image is empty (proven by the #992 spike) — and calls the shared
# `setup-devkit-toolchain` composite as its first step to provision the toolchain
# for its mode (in-image env for container, the Nix flake dev-shell for direnv,
# a uv host install for bare). After that preamble, plain
# `just sync|precommit|test` runs identically in every mode.
#
# This collapses the former per-mode ci.yml overlays (container / direnv / bare)
# into a single managed file (#991).
#
# Jobs:
#   1. resolve-toolchain — Resolve delivery mode + image from .vig-os
#   2. lint              — Pre-commit hooks
#   3. test              — Run tests
#   4. commit-checks     — Commit message + PR title validation (PRs only)
#   5. dependency-review — Vulnerable-dependency gate (public-repo PRs only)
#   6. summary           — Aggregate results for branch protection
#
# Triggers:
#   - Pull requests to dev, release/**, and main
#   - Manual workflow_dispatch
#

name: CI

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - dev
      - 'release/**'
      - main
  workflow_dispatch:
    inputs:
      test-suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - lint
          - test
      image-tag:
        description: 'Container image tag to use'
        required: false
        type: string

permissions:
  contents: read
  packages: read

jobs:
  resolve-toolchain:
    name: Resolve toolchain
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      mode: ${{ steps.resolve.outputs.mode }}
      image: ${{ steps.resolve.outputs.image }}
      image-tag: ${{ steps.resolve.outputs.image-tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          sparse-checkout: |
            .vig-os
            .github/actions/resolve-toolchain
          sparse-checkout-cone-mode: false

      - name: Resolve toolchain
        id: resolve
        uses: ./.github/actions/resolve-toolchain
        with:
          registry-token: ${{ secrets.GHCR_PULL_TOKEN || github.token }}
          registry-username: ${{ github.actor }}
          image-tag: ${{ inputs.image-tag }}

  lint:
    name: Lint & Format
    needs: [resolve-toolchain]
    runs-on: ubuntu-24.04
    # Empty image (direnv/bare) => runs on the host; non-empty => in-container.
    # The credentials block is inert on the host (proven by the #992 spike).
    container:
      image: ${{ needs.resolve-toolchain.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PULL_TOKEN || github.token }}
    timeout-minutes: 15
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'lint'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Mode-aware preamble: exports the in-image env + prek skew guard in
      # container mode, provisions the Nix dev-shell (direnv) or the uv host
      # toolchain (bare) otherwise. After this, `just` works in every mode.
      - name: Set up devkit toolchain
        uses: ./.github/actions/setup-devkit-toolchain
        with:
          mode: ${{ needs.resolve-toolchain.outputs.mode }}
          devkit-version: ${{ needs.resolve-toolchain.outputs.image-tag }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Sync project dependencies
        run: just sync

      - name: Run pre-commit hooks
        run: just precommit

  test:
    name: Tests
    needs: [resolve-toolchain]
    runs-on: ubuntu-24.04
    container:
      image: ${{ needs.resolve-toolchain.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PULL_TOKEN || github.token }}
    timeout-minutes: 20
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'test'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up devkit toolchain
        uses: ./.github/actions/setup-devkit-toolchain
        with:
          mode: ${{ needs.resolve-toolchain.outputs.mode }}
          devkit-version: ${{ needs.resolve-toolchain.outputs.image-tag }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Sync project dependencies
        run: just sync

      - name: Run tests
        run: just test

  # Commit-message validation. `validate-commit-msg` is a commit-msg stage
  # hook, so `just precommit` (prek run --all-files) never runs it — the only
  # other enforcement path is the local .githooks shim, which is silently inert
  # whenever core.hooksPath is unset or stale. This lane re-checks the standard
  # against the commits the PR actually proposes to write into history.
  commit-checks:
    name: Commit Messages
    needs: [resolve-toolchain]
    runs-on: ubuntu-24.04
    container:
      image: ${{ needs.resolve-toolchain.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PULL_TOKEN || github.token }}
    timeout-minutes: 15
    # pull_request only: there is no base ref to diff against on dispatch.
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # The default depth-1 clone has neither the base branch nor the PR's
          # own commits, and validate-commit-range walks base..head.
          fetch-depth: 0

      - name: Set up devkit toolchain
        uses: ./.github/actions/setup-devkit-toolchain
        with:
          mode: ${{ needs.resolve-toolchain.outputs.mode }}
          devkit-version: ${{ needs.resolve-toolchain.outputs.image-tag }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # The PR title is attacker-controlled text, so it reaches the validator as
      # an environment variable — never interpolated into the shell command.
      # The range starts at the merge-base with the *current* base branch, not
      # at pull_request.base.sha: if the branch merged the base back in,
      # base.sha would drag already-landed commits into the range and fail the
      # PR for history it did not author.
      - name: Validate commit messages and PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          BASE_SHA="$(git merge-base "origin/${BASE_REF}" "${HEAD_SHA}")"
          echo "Validating ${BASE_SHA}..${HEAD_SHA} (base: ${BASE_REF})"
          uv run validate-commit-range \
            --base "${BASE_SHA}" \
            --head "${HEAD_SHA}" \
            --title "${PR_TITLE}" \
            --blocked-patterns .github/agent-blocklist.toml

      # The PR title and body are attacker-controlled text visible in the UI and
      # notifications even though the body never enters git history, so they reach
      # the guard as environment variables — never interpolated into the shell
      # command. validate-commit-range already covers the title; this adds the
      # body as cheap defense-in-depth against the agent blocklist.
      - name: Check PR title and body for agent fingerprints
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: uv run check-pr-agent-fingerprints

  # Blocks PRs that introduce known-vulnerable dependencies, off GitHub's
  # dependency graph (lockfiles + action pins alike) — no toolchain, no
  # container, no resolve-toolchain. Doubly guarded, mirroring the codeql.yml
  # private-repo note: (1) dependency-review-action only works on pull_request,
  # where it diffs the base and head dependency sets; (2) the dependency-graph
  # API is unavailable on Free-plan private repos, so private repos get a
  # skipped (neutral) run instead of a permanently red one, and a repo later
  # flipped public starts gating automatically with no re-scaffold (#1039).
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: ${{ github.event_name == 'pull_request' && !github.event.repository.private }}
    permissions:
      contents: read
      pull-requests: write   # post the dependency-review summary comment

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Review dependencies for vulnerabilities
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: high

  summary:
    name: CI Summary
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [resolve-toolchain, lint, test, commit-checks, dependency-review]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "CI Results Summary"
          echo "==================="
          echo ""
          echo "Resolve toolchain: ${{ needs.resolve-toolchain.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Commit messages: ${{ needs.commit-checks.result }}"
          echo "Dependency review: ${{ needs.dependency-review.result }}"
          echo ""

          FAILED=false

          if [ "${{ needs.resolve-toolchain.result }}" = "failure" ] || [ "${{ needs.resolve-toolchain.result }}" = "cancelled" ]; then
            echo "ERROR: Toolchain resolution failed"
            FAILED=true
          fi

          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "ERROR: Lint checks failed"
            FAILED=true
          fi

          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "ERROR: Tests failed"
            FAILED=true
          fi

          if [ "${{ needs.commit-checks.result }}" = "failure" ]; then
            echo "ERROR: Commit message checks failed"
            FAILED=true
          fi

          # Skipped on push/dispatch and on private repos (same skip-is-OK
          # treatment as commit-checks); only a genuine failure trips the gate.
          if [ "${{ needs.dependency-review.result }}" = "failure" ]; then
            echo "ERROR: Dependency review failed"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "One or more checks failed"
            exit 1
          fi

          echo ""
          echo "All executed checks passed"
