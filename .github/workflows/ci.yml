# CI Workflow
#
# Runs CI jobs inside the vigOS devcontainer image.
# This is the canonical CI workflow template for workspace projects.
#
# Jobs:
#   1. resolve-image — Determine and validate image tag
#   2. lint          — Pre-commit hooks
#   3. test          — Pytest
#   4. summary       — Aggregate results for branch protection
#
# Triggers:
#   - Pull requests to dev, release/**, and main
#   - Manual workflow_dispatch
#

name: CI

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - dev
      - 'release/**'
      - main
  workflow_dispatch:
    inputs:
      test-suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - lint
          - test
      image-tag:
        description: 'Container image tag to use'
        required: false
        type: string

permissions:
  contents: read

jobs:
  resolve-image:
    name: Resolve image tag
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      image-tag: ${{ steps.resolve.outputs.image-tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          sparse-checkout: |
            .vig-os
            .github/actions/resolve-image
          sparse-checkout-cone-mode: false

      - name: Resolve container image
        id: resolve
        uses: ./.github/actions/resolve-image
        with:
          image-tag: ${{ inputs.image-tag }}

  lint:
    name: Lint & Format
    needs: [resolve-image]
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/vig-os/devcontainer:${{ needs.resolve-image.outputs.image-tag }}
      env:
        # Image-baked prek cache; may miss if repo pins hooks by hash (see docs/container-ci-quirks.md)
        PREK_HOME: /opt/prek-cache
        # Reuse the venv already present in the image instead of creating a new one
        UV_PROJECT_ENVIRONMENT: /root/assets/workspace/.venv
    timeout-minutes: 10
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'lint'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Fix git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Sync project dependencies
        run: just sync

      - name: Run pre-commit hooks
        run: just precommit

  test:
    name: Tests
    needs: [resolve-image]
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/vig-os/devcontainer:${{ needs.resolve-image.outputs.image-tag }}
      env:
        # Reuse the venv already present in the image instead of creating a new one
        UV_PROJECT_ENVIRONMENT: /root/assets/workspace/.venv
    timeout-minutes: 15
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'test'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Fix git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Sync project dependencies
        run: just sync

      - name: Run tests
        run: just test

  summary:
    name: CI Summary
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [resolve-image, lint, test]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "CI Results Summary"
          echo "==================="
          echo ""
          echo "Resolve image: ${{ needs.resolve-image.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo ""

          FAILED=false

          if [ "${{ needs.resolve-image.result }}" = "failure" ] || [ "${{ needs.resolve-image.result }}" = "cancelled" ]; then
            echo "ERROR: Image resolution failed"
            FAILED=true
          fi

          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "ERROR: Lint checks failed"
            FAILED=true
          fi

          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "ERROR: Tests failed"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "One or more checks failed"
            exit 1
          fi

          echo ""
          echo "All executed checks passed"
