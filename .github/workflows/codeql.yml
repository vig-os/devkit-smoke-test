# Managed by vigOS devkit — regenerated on upgrade; local edits are lost.
# Customize in justfile.project. Bugs / missing tools: https://github.com/vig-os/devkit/issues

# CodeQL Static Analysis
#
# Runs GitHub CodeQL analysis on Python build tooling and GitHub Actions workflows.
# While these are build tools (not product code), static analysis provides
# defense-in-depth for scripts that handle git operations, file I/O, and
# subprocess execution.
#
# Triggers:
#   - Pull requests to dev, release/**, and main
#   - Pushes to main (post-merge analysis)
#   - Weekly schedule (catch newly disclosed patterns)
#
# NOTE — GitHub default code-scanning setup: this is an *advanced* CodeQL
# configuration. GitHub rejects its SARIF uploads while the repository's
# *default* code-scanning setup is enabled ("CodeQL analyses from advanced
# configurations cannot be processed when the default setup is enabled").
# To adopt this workflow, disable the default code-scanning setup
# (Settings -> Code security -> Code scanning). In a scaffolded consumer the
# devkit renders the `language:` matrix below to match the repo (Python ->
# python, Node -> javascript-typescript, Rust omits its leg; `actions` is
# always analyzed) but never changes the code-scanning API setting for you.
#
# NOTE — private repositories: CodeQL requires GitHub Advanced Security, which
# is unavailable on Free-plan private repos, so the analysis can never succeed
# there. The `analyze` job is therefore guarded with
# `if: ${{ !github.event.repository.private }}`: private repos get a skipped
# (neutral) run instead of a permanently red one, and a repo later flipped
# public starts scanning automatically with no re-scaffold. The guard is valid
# on every trigger this workflow declares — `github.event.repository.private` is
# populated for `pull_request`, `push`, and (since GitHub's 2022-09-27 change
# adding repository info to scheduled-run payloads) `schedule`.

name: CodeQL

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - dev
      - 'release/**'
      - main
  push:
    branches:
      - main
    paths:
      - '**.py'
      - '.github/workflows/**'
  schedule:
    - cron: '15 2 * * 1'  # Monday at 02:15 UTC

permissions: {}  # restrict default; job declares its own

jobs:
  analyze:
    name: CodeQL Analysis
    # Skip on private repos: CodeQL needs GHAS (unavailable on Free-plan private
    # repos), so it would fail permanently. See the header note for details.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      security-events: write   # upload SARIF results
      contents: read           # read repository
      actions: read            # required for private repos (harmless for public)

    strategy:
      fail-fast: false
      matrix:
        language: ['python', 'actions']

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          languages: ${{ matrix.language }}

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          category: '/language:${{ matrix.language }}'
