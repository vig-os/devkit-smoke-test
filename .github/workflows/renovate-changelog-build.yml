# Append Keep-a-Changelog Unreleased entries for Renovate dependency PRs (Refs: #506, #562, #863).
# Read-only build on pull_request; privileged commit runs via workflow_run from default branch.
# The sender-login guard skips synchronize events raised by the changelog commit bot's own
# push (which uses an app token that re-triggers workflows), breaking the self-commit loop.

name: Renovate changelog build

on:  # yamllint disable-line rule:truthy
  pull_request:
    types: [opened, synchronize]

permissions: {}

jobs:
  resolve-toolchain:
    name: Resolve toolchain
    if: >-
      github.event.pull_request.user.login == 'renovate[bot]' &&
      github.event.sender.login != 'commit-action-bot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions:
      contents: read
      packages: read
    outputs:
      mode: ${{ steps.resolve.outputs.mode }}
      image: ${{ steps.resolve.outputs.image }}
      image-tag: ${{ steps.resolve.outputs.image-tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          sparse-checkout: |
            .vig-os
            .github/actions/resolve-toolchain
          sparse-checkout-cone-mode: false

      - name: Resolve toolchain
        id: resolve
        uses: ./.github/actions/resolve-toolchain
        with:
          registry-token: ${{ secrets.GHCR_PULL_TOKEN || github.token }}
          registry-username: ${{ github.actor }}

  build:
    name: Build changelog artifact
    if: >-
      github.event.pull_request.user.login == 'renovate[bot]' &&
      github.event.sender.login != 'commit-action-bot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: [resolve-toolchain]
    runs-on: ubuntu-24.04
    container:
      image: ${{ needs.resolve-toolchain.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PULL_TOKEN || github.token }}
    timeout-minutes: 10
    concurrency:
      group: renovate-changelog-${{ github.repository }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up devkit toolchain
        uses: ./.github/actions/setup-devkit-toolchain
        with:
          mode: ${{ needs.resolve-toolchain.outputs.mode }}
          devkit-version: ${{ needs.resolve-toolchain.outputs.image-tag }}

      - name: Update CHANGELOG.md from Renovate PR metadata
        id: update
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          renovate-changelog-pr
          if git diff --quiet CHANGELOG.md 2>/dev/null; then
            echo "modified=false" >> "$GITHUB_OUTPUT"
          else
            echo "modified=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare changelog artifact
        shell: bash
        env:
          MODIFIED: ${{ steps.update.outputs.modified }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          mkdir -p changelog-artifact
          # %q-quote values: the commit workflow sources this file, and grouped
          # Renovate branch names contain shell metacharacters (e.g. parentheses
          # in renovate/python-(minor-and-patch)).
          {
            printf 'MODIFIED=%q\n' "${MODIFIED}"
            printf 'PR_NUMBER=%q\n' "${PR_NUMBER}"
            printf 'HEAD_REF=%q\n' "${HEAD_REF}"
          } > changelog-artifact/metadata.env
          if [[ "${MODIFIED}" == "true" ]]; then
            cp CHANGELOG.md changelog-artifact/
          fi

      - name: Upload changelog artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: renovate-changelog
          path: changelog-artifact/
          # The workspace mirror lives under the hidden .devcontainer directory,
          # which upload-artifact excludes by default.
          include-hidden-files: true
          retention-days: 1
